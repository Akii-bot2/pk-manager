<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者画面 | ポケカ大会管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="./js/api.js"></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="min-h-screen text-white" style="background-color:#0a0e1a;">

  <!-- ===== HEADER ===== -->
  <header x-data="{ open: false }" class="sticky top-0 z-50 shadow-lg"
    style="background-color:#0f1629; border-bottom:2px solid #dc2626;">
    <div class="flex items-center justify-between px-4 py-3">
      <a href="./index.html" class="text-xl font-black tracking-tight" style="color:#fbbf24;">ポケカ大会管理</a>
      <button @click="open = !open" class="p-2 rounded-lg" style="color:#fbbf24;" aria-label="メニュー">
        <svg x-show="!open" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        <svg x-show="open" x-cloak class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <nav x-show="open" x-cloak x-transition @click.outside="open = false" class="border-t"
      style="background-color:#161e3a; border-color:#1e2a4a;">
      <ul class="py-1">
        <template x-for="item in [
          { label: 'ランキング', href: './index.html' },
          { label: 'メンバー登録', href: './member.html' },
          { label: 'シティリーグ', href: './city.html' },
          { label: 'トレリ', href: './trainer.html' },
          { label: 'CL記録', href: './cl.html' },
          { label: 'カレンダー', href: './calendar.html' },
          { label: '管理者', href: './admin.html' },
        ]" :key="item.href">
          <li><a :href="item.href" @click="open = false"
            class="block px-6 py-3 text-sm font-medium border-l-4 border-transparent transition-all"
            style="color:#e2e8f0;"
            onmouseover="this.style.borderLeftColor='#dc2626';this.style.backgroundColor='#1e2a4a';"
            onmouseout="this.style.borderLeftColor='transparent';this.style.backgroundColor='';"
            x-text="item.label"></a></li>
        </template>
      </ul>
    </nav>
  </header>

  <!-- ===== MAIN ===== -->
  <main x-data="adminApp()" class="max-w-2xl mx-auto px-4 py-6 space-y-6">

    <div class="flex items-center gap-3 mb-2">
      <div class="w-1 h-7 rounded-full" style="background-color:#dc2626;"></div>
      <h2 class="text-lg font-bold tracking-wide" style="color:#fbbf24;">管理者画面</h2>
    </div>

    <!-- ===== ログインエリア ===== -->
    <div class="rounded-xl p-5" style="background-color:#161e3a; border:1px solid #1e2a4a;">
      <h3 class="text-base font-bold mb-4" style="color:#fbbf24;">管理者ログイン</h3>

      <div x-show="!loggedIn">
        <div class="flex gap-3">
          <input type="password" x-model="passwordInput" @keydown.enter="login()"
            placeholder="パスワードを入力" class="flex-1 rounded-lg px-4 py-2 text-sm focus:outline-none"
            style="background-color:#0f1629; border:1px solid #1e2a4a; color:#f1f5f9;"
            onfocus="this.style.borderColor='#dc2626';" onblur="this.style.borderColor='#1e2a4a';" />
          <button @click="login()" :disabled="loginLoading"
            class="px-5 py-2 rounded-lg text-sm font-bold"
            style="background-color:#dc2626; color:#fff;"
            :style="loginLoading ? 'opacity:0.5;' : ''">
            <span x-show="!loginLoading">ログイン</span>
            <span x-show="loginLoading" x-cloak>確認中...</span>
          </button>
        </div>
        <p x-show="loginError" x-cloak class="mt-2 text-sm font-medium" style="color:#f87171;" x-text="loginError"></p>
      </div>

      <div x-show="loggedIn" x-cloak class="flex items-center justify-between">
        <span class="text-sm" style="color:#4ade80;">✓ ログイン済み</span>
        <button @click="logout()" class="text-xs px-3 py-1 rounded-lg"
          style="background-color:#1e2a4a; color:#94a3b8;">ログアウト</button>
      </div>
    </div>

    <!-- ===== シーズン管理 ===== -->
    <div x-show="loggedIn" x-cloak class="rounded-xl p-5 space-y-4"
      style="background-color:#161e3a; border:1px solid #1e2a4a;">
      <div class="flex items-center gap-2 mb-1">
        <div class="w-1 h-5 rounded-full" style="background-color:#dc2626;"></div>
        <h3 class="text-base font-bold" style="color:#fbbf24;">シーズン管理</h3>
      </div>

      <!-- 登録済みシーズン -->
      <div>
        <p class="text-xs mb-2" style="color:#64748b;">登録済みシーズン</p>
        <div x-show="seasonsLoading" class="text-sm py-3 text-center" style="color:#64748b;">読み込み中...</div>
        <div x-show="!seasonsLoading && seasons.length === 0" class="text-sm py-3 text-center" style="color:#64748b;">シーズンがありません</div>
        <div x-show="!seasonsLoading && seasons.length > 0" class="space-y-2">
          <template x-for="s in seasons" :key="s.id">
            <div class="flex items-center justify-between rounded-lg px-4 py-2"
              style="background-color:#0f1629; border:1px solid #1e2a4a;">
              <div>
                <span class="text-sm font-semibold" style="color:#f1f5f9;" x-text="s.name"></span>
                <span class="ml-2 text-xs" style="color:#64748b;" x-text="'(' + s.year + ' S' + s.season_number + ')'"></span>
              </div>
              <button @click="deleteSeason(s.id)" class="text-xs px-3 py-1 rounded-lg font-medium"
                style="background-color:#7f1d1d; color:#fca5a5;">削除</button>
            </div>
          </template>
        </div>
      </div>

      <!-- シーズン追加フォーム -->
      <div class="rounded-lg p-4 space-y-3" style="background-color:#0f1629; border:1px solid #1e2a4a;">
        <p class="text-xs font-semibold" style="color:#94a3b8;">シーズン追加</p>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs mb-1 block" style="color:#64748b;">年度</label>
            <input type="number" x-model.number="newSeason.year" placeholder="2026"
              class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none"
              style="background-color:#161e3a; border:1px solid #1e2a4a; color:#f1f5f9;" />
          </div>
          <div>
            <label class="text-xs mb-1 block" style="color:#64748b;">シーズン番号</label>
            <select x-model.number="newSeason.season_number"
              class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none"
              style="background-color:#161e3a; border:1px solid #1e2a4a; color:#f1f5f9;">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>
        </div>
        <div>
          <label class="text-xs mb-1 block" style="color:#64748b;">表示名（例：2026 S1）</label>
          <input type="text" x-model="newSeason.name" placeholder="2026 S1"
            class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none"
            style="background-color:#161e3a; border:1px solid #1e2a4a; color:#f1f5f9;" />
        </div>
        <button @click="addSeason()" :disabled="seasonSaving"
          class="w-full py-2 rounded-lg text-sm font-bold"
          style="background-color:#dc2626; color:#fff;"
          :style="seasonSaving ? 'opacity:0.5;' : ''">
          <span x-text="seasonSaving ? '追加中...' : '追加'"></span>
        </button>
        <p x-show="seasonMsg" x-cloak class="text-xs font-medium"
          :style="seasonMsgOk ? 'color:#4ade80;' : 'color:#f87171;'" x-text="seasonMsg"></p>
      </div>
    </div>

    <!-- ===== メンバー管理 ===== -->
    <div x-show="loggedIn" x-cloak class="rounded-xl p-5 space-y-4"
      style="background-color:#161e3a; border:1px solid #1e2a4a;">
      <div class="flex items-center gap-2 mb-1">
        <div class="w-1 h-5 rounded-full" style="background-color:#dc2626;"></div>
        <h3 class="text-base font-bold" style="color:#fbbf24;">メンバー管理</h3>
      </div>

      <div x-show="membersLoading" class="text-sm py-3 text-center" style="color:#64748b;">読み込み中...</div>
      <div x-show="!membersLoading && members.length === 0" class="text-sm py-3 text-center" style="color:#64748b;">メンバーがいません</div>

      <div x-show="!membersLoading" class="space-y-2">
        <template x-for="m in members" :key="m.id">
          <div class="rounded-lg px-4 py-3" style="background-color:#0f1629; border:1px solid #1e2a4a;">

            <!-- 通常表示 -->
            <div x-show="editingMemberId !== m.id">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-medium" style="color:#f1f5f9;" x-text="m.name"></span>
                <div class="flex gap-2">
                  <button @click="startEdit(m)" class="text-xs px-3 py-1 rounded-lg font-medium"
                    style="background-color:#1e3a5f; color:#93c5fd;">名前編集</button>
                  <button @click="deleteMember(m.id)" class="text-xs px-3 py-1 rounded-lg font-medium"
                    style="background-color:#7f1d1d; color:#fca5a5;">削除</button>
                </div>
              </div>
              <!-- バッジ管理 -->
              <div class="flex gap-2">
                <button @click="toggleMark(m, 'WCS')"
                  class="text-xs px-2 py-0.5 rounded font-bold transition-opacity hover:opacity-80"
                  :style="hasMark(m, 'WCS') ? 'background-color:#7c3aed; color:#fff;' : 'background-color:#1e2a4a; color:#64748b;'">
                  🏆🌍 WCS</button>
                <button @click="toggleMark(m, 'JCS')"
                  class="text-xs px-2 py-0.5 rounded font-bold transition-opacity hover:opacity-80"
                  :style="hasMark(m, 'JCS') ? 'background-color:#dc2626; color:#fff;' : 'background-color:#1e2a4a; color:#64748b;'">
                  🏆🇯🇵 JCS</button>
                <button @click="toggleMark(m, 'CL')"
                  class="text-xs px-2 py-0.5 rounded font-bold transition-opacity hover:opacity-80"
                  :style="hasMark(m, 'CL') ? 'background-color:#0369a1; color:#fff;' : 'background-color:#1e2a4a; color:#64748b;'">
                  🏆🎯 CL</button>
              </div>
            </div>

            <!-- 編集中 -->
            <div x-show="editingMemberId === m.id" x-cloak class="space-y-2">
              <input type="text" x-model="editingName" @keydown.enter="saveMember(m.id)" @keydown.escape="cancelEdit()"
                class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none"
                style="background-color:#161e3a; border:1px solid #dc2626; color:#f1f5f9;" />
              <div class="flex gap-2">
                <button @click="saveMember(m.id)" class="flex-1 py-1.5 rounded-lg text-xs font-bold"
                  style="background-color:#dc2626; color:#fff;">保存</button>
                <button @click="cancelEdit()" class="flex-1 py-1.5 rounded-lg text-xs font-bold"
                  style="background-color:#1e2a4a; color:#94a3b8;">キャンセル</button>
              </div>
            </div>

          </div>
        </template>
      </div>

      <p x-show="memberMsg" x-cloak class="text-xs font-medium"
        :style="memberMsgOk ? 'color:#4ade80;' : 'color:#f87171;'" x-text="memberMsg"></p>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="mt-10 py-6 px-4 text-center border-t" style="border-color:#1e2a4a;">
    <p class="text-xs" style="color:#64748b;">※ 管理者パスワードはGASスクリプトプロパティで設定してください。</p>
  </footer>

  <script>
    function adminApp() {
      return {
        loggedIn: false,
        passwordInput: '',
        adminPassword: '',
        loginError: '',
        loginLoading: false,

        seasons: [],
        seasonsLoading: false,
        newSeason: { year: new Date().getFullYear(), season_number: 1, name: '' },
        seasonSaving: false,
        seasonMsg: '',
        seasonMsgOk: false,

        members: [],
        membersLoading: false,
        editingMemberId: null,
        editingName: '',
        memberMsg: '',
        memberMsgOk: false,

        async login() {
          if (!this.passwordInput) { this.loginError = 'パスワードを入力してください'; return; }
          this.loginLoading = true;
          this.loginError = '';
          try {
            const data = await gasPost({ action: 'adminLogin', admin_password: this.passwordInput });
            if (data.success) {
              this.adminPassword = this.passwordInput;
              this.passwordInput = '';
              this.loggedIn = true;
              await Promise.all([this.fetchSeasons(), this.fetchMembers()]);
            } else {
              this.loginError = 'パスワードが違います';
            }
          } catch (e) {
            this.loginError = e.message || 'ログインに失敗しました';
          } finally {
            this.loginLoading = false;
          }
        },

        logout() {
          this.loggedIn = false;
          this.adminPassword = '';
          this.passwordInput = '';
          this.seasons = [];
          this.members = [];
          this.seasonMsg = '';
          this.memberMsg = '';
          this.editingMemberId = null;
        },

        // ---- シーズン ----

        async fetchSeasons() {
          this.seasonsLoading = true;
          try { this.seasons = await gasGet('getSeasons'); } catch (e) { console.error(e); }
          finally { this.seasonsLoading = false; }
        },

        async addSeason() {
          if (!this.newSeason.year || !this.newSeason.name.trim()) {
            this.showSeasonMsg('年度と表示名を入力してください', false); return;
          }
          this.seasonSaving = true;
          try {
            await gasPost({
              action: 'addSeason',
              admin_password: this.adminPassword,
              year: this.newSeason.year,
              season_number: this.newSeason.season_number,
              name: this.newSeason.name.trim(),
            });
            this.showSeasonMsg('シーズンを追加しました', true);
            this.newSeason.name = '';
            await this.fetchSeasons();
          } catch (e) {
            this.showSeasonMsg(e.message || '追加に失敗しました', false);
          } finally {
            this.seasonSaving = false;
          }
        },

        async deleteSeason(id) {
          if (!confirm('このシーズンを削除しますか？')) return;
          try {
            await gasPost({ action: 'deleteSeason', admin_password: this.adminPassword, id });
            this.showSeasonMsg('削除しました', true);
            await this.fetchSeasons();
          } catch (e) {
            this.showSeasonMsg(e.message || '削除に失敗しました', false);
          }
        },

        showSeasonMsg(msg, ok) {
          this.seasonMsg = msg;
          this.seasonMsgOk = ok;
          setTimeout(() => { this.seasonMsg = ''; }, 3000);
        },

        // ---- メンバー ----

        async fetchMembers() {
          this.membersLoading = true;
          try { this.members = await gasGet('getMembers'); } catch (e) { console.error(e); }
          finally { this.membersLoading = false; }
        },

        startEdit(m) {
          this.editingMemberId = m.id;
          this.editingName = m.name;
          this.memberMsg = '';
        },

        cancelEdit() { this.editingMemberId = null; this.editingName = ''; },

        async saveMember(id) {
          if (!this.editingName.trim()) { this.showMemberMsg('名前を入力してください', false); return; }
          try {
            await gasPost({
              action: 'updateMember',
              admin_password: this.adminPassword,
              id,
              name: this.editingName.trim(),
            });
            this.showMemberMsg('更新しました', true);
            this.cancelEdit();
            await this.fetchMembers();
          } catch (e) {
            this.showMemberMsg(e.message || '更新に失敗しました', false);
          }
        },

        async deleteMember(id) {
          if (!confirm('このメンバーを削除しますか？')) return;
          try {
            await gasPost({ action: 'deleteMember', admin_password: this.adminPassword, id });
            this.showMemberMsg('削除しました', true);
            await this.fetchMembers();
          } catch (e) {
            this.showMemberMsg(e.message || '削除に失敗しました', false);
          }
        },

        showMemberMsg(msg, ok) {
          this.memberMsg = msg;
          this.memberMsgOk = ok;
          setTimeout(() => { this.memberMsg = ''; }, 3000);
        },

        hasMark(m, mark) {
          return m.marks ? m.marks.split(',').includes(mark) : false;
        },

        async toggleMark(m, mark) {
          const current = m.marks ? m.marks.split(',').filter(Boolean) : [];
          const newMarks = current.includes(mark)
            ? current.filter(x => x !== mark)
            : [...current, mark];
          try {
            await gasPost({
              action: 'updateMemberMarks',
              admin_password: this.adminPassword,
              id: m.id,
              marks: newMarks.join(','),
            });
            m.marks = newMarks.join(',');
            this.showMemberMsg((newMarks.includes(mark) ? '付与' : '削除') + 'しました: ' + mark, true);
          } catch (e) {
            this.showMemberMsg(e.message || 'バッジ更新に失敗しました', false);
          }
        },
      };
    }
  </script>
</body>
</html>
