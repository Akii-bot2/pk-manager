<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>メンバー登録 | ポケカ大会管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              900: '#0a0e1a',
              800: '#0f1629',
              700: '#161e3a',
              600: '#1e2a4a',
            },
          },
        },
      },
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/static/js/config.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="min-h-screen text-white" style="background-color:#0a0e1a;">

  <!-- ===== HEADER ===== -->
  <header
    x-data="{ open: false }"
    class="sticky top-0 z-50 shadow-lg"
    style="background-color:#0f1629; border-bottom:2px solid #dc2626;"
  >
    <div class="flex items-center justify-between px-4 py-3">
      <a href="/static/index.html" class="text-xl font-black tracking-tight" style="color:#fbbf24;">
        ポケカ大会管理
      </a>
      <button
        @click="open = !open"
        class="p-2 rounded-lg focus:outline-none"
        style="color:#fbbf24;"
        aria-label="メニューを開く"
      >
        <svg x-show="!open" xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg x-show="open" x-cloak xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- ドロップダウンメニュー -->
    <nav
      x-show="open"
      x-cloak
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 -translate-y-2"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 translate-y-0"
      x-transition:leave-end="opacity-0 -translate-y-2"
      @click.outside="open = false"
      class="border-t"
      style="background-color:#161e3a; border-color:#1e2a4a;"
    >
      <ul class="py-1">
        <template x-for="item in [
          { label: 'ランキング',     href: '/static/index.html' },
          { label: 'メンバー登録',   href: '/static/member.html' },
          { label: 'シティリーグ',   href: '/static/city.html' },
          { label: 'トレリ',         href: '/static/trainer.html' },
          { label: 'CL記録',         href: '/static/cl.html' },
          { label: 'カレンダー',     href: '/static/calendar.html' },
          { label: '管理者',         href: '/static/admin.html' },
        ]" :key="item.href">
          <li>
            <a
              :href="item.href"
              @click="open = false"
              class="block px-6 py-3 text-sm font-medium border-l-4 border-transparent transition-all"
              style="color:#e2e8f0;"
              onmouseover="this.style.borderLeftColor='#dc2626'; this.style.backgroundColor='#1e2a4a';"
              onmouseout="this.style.borderLeftColor='transparent'; this.style.backgroundColor='';"
              x-text="item.label"
            ></a>
          </li>
        </template>
      </ul>
    </nav>
  </header>

  <!-- ===== MAIN ===== -->
  <main
    x-data="memberApp()"
    x-init="init()"
    class="max-w-2xl mx-auto px-4 py-6"
  >

    <!-- ===== メンバー登録フォーム ===== -->
    <div class="mb-8 rounded-xl p-5" style="background-color:#161e3a; border:1px solid #1e2a4a;">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-1 h-7 rounded-full" style="background-color:#dc2626;"></div>
        <h2 class="text-lg font-bold tracking-wide" style="color:#fbbf24;">メンバー登録</h2>
      </div>

      <form @submit.prevent="register()" class="flex gap-2">
        <input
          x-model="newName"
          type="text"
          placeholder="名前を入力"
          maxlength="50"
          class="flex-1 rounded-lg px-4 py-2.5 text-sm font-medium outline-none focus:ring-2"
          style="background-color:#0f1629; border:1px solid #1e2a4a; color:#f1f5f9; caret-color:#fbbf24;"
          onfocus="this.style.borderColor='#dc2626'; this.style.boxShadow='0 0 0 2px rgba(220,38,38,0.3)';"
          onblur="this.style.borderColor='#1e2a4a'; this.style.boxShadow='';"
        />
        <button
          type="submit"
          :disabled="regLoading"
          class="px-5 py-2.5 rounded-lg text-sm font-bold transition-opacity"
          style="background-color:#dc2626; color:#fff;"
          :style="regLoading ? 'opacity:0.5; cursor:not-allowed;' : ''"
        >
          <span x-show="!regLoading">登録する</span>
          <span x-show="regLoading" x-cloak>登録中...</span>
        </button>
      </form>

      <!-- 成功メッセージ -->
      <p
        x-show="regMsg"
        x-cloak
        x-transition
        class="mt-3 text-sm font-medium"
        style="color:#34d399;"
        x-text="regMsg"
      ></p>
      <!-- エラーメッセージ -->
      <p
        x-show="regError"
        x-cloak
        x-transition
        class="mt-3 text-sm font-medium"
        style="color:#f87171;"
        x-text="regError"
      ></p>
    </div>

    <!-- ===== メンバー一覧 ===== -->
    <div>
      <div class="flex items-center gap-3 mb-4">
        <div class="w-1 h-7 rounded-full" style="background-color:#dc2626;"></div>
        <h2 class="text-lg font-bold tracking-wide" style="color:#fbbf24;">メンバー一覧</h2>
      </div>

      <!-- ローディング -->
      <div x-show="loading" x-cloak class="flex flex-col items-center justify-center py-16 gap-4">
        <svg class="animate-spin w-10 h-10" style="color:#dc2626;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        <span class="text-sm" style="color:#94a3b8;">読み込み中...</span>
      </div>

      <!-- データなし -->
      <div x-show="!loading && members.length === 0" x-cloak class="text-center py-12">
        <p class="text-base" style="color:#94a3b8;">メンバーがいません</p>
      </div>

      <!-- 一覧 -->
      <div x-show="!loading && members.length > 0" x-cloak class="space-y-2">
        <template x-for="m in members" :key="m.id">
          <div class="rounded-xl p-4" style="background-color:#161e3a; border:1px solid #1e2a4a;">

            <!-- 通常表示 -->
            <div x-show="editingId !== m.id" class="flex items-center gap-3">
              <a
                :href="'/static/member_detail.html?id=' + m.id"
                class="flex-1 font-semibold truncate hover:underline"
                style="color:#f1f5f9;"
                x-text="m.name"
              ></a>
              <button
                @click="startEdit(m)"
                class="px-3 py-1 rounded-lg text-xs font-bold transition-opacity hover:opacity-80"
                style="background-color:#1e2a4a; color:#fbbf24; border:1px solid #dc2626;"
              >編集</button>
              <button
                @click="openDelete(m)"
                class="px-3 py-1 rounded-lg text-xs font-bold transition-opacity hover:opacity-80"
                style="background-color:#1e2a4a; color:#f87171; border:1px solid #7f1d1d;"
              >削除</button>
            </div>

            <!-- インライン編集 -->
            <div x-show="editingId === m.id" x-cloak class="space-y-3">
              <div class="flex gap-2">
                <input
                  x-model="editName"
                  type="text"
                  placeholder="新しい名前"
                  maxlength="50"
                  class="flex-1 rounded-lg px-3 py-2 text-sm outline-none"
                  style="background-color:#0f1629; border:1px solid #dc2626; color:#f1f5f9; caret-color:#fbbf24;"
                />
              </div>
              <!-- 本人確認：自分のIDを選択 -->
              <div>
                <label class="block text-xs mb-1" style="color:#94a3b8;">あなたは誰ですか？（本人確認）</label>
                <select
                  x-model="editSelfId"
                  class="w-full rounded-lg px-3 py-2 text-sm outline-none"
                  style="background-color:#0f1629; border:1px solid #1e2a4a; color:#f1f5f9;"
                >
                  <option value="">-- 自分の名前を選択 --</option>
                  <template x-for="opt in members" :key="opt.id">
                    <option :value="opt.id" x-text="opt.name"></option>
                  </template>
                </select>
              </div>

              <!-- エラー -->
              <p x-show="editError" x-cloak class="text-xs" style="color:#f87171;" x-text="editError"></p>

              <div class="flex gap-2">
                <button
                  @click="saveEdit(m)"
                  class="px-4 py-1.5 rounded-lg text-xs font-bold"
                  style="background-color:#dc2626; color:#fff;"
                >保存</button>
                <button
                  @click="cancelEdit()"
                  class="px-4 py-1.5 rounded-lg text-xs font-bold"
                  style="background-color:#1e2a4a; color:#94a3b8;"
                >キャンセル</button>
              </div>
            </div>

          </div>
        </template>
      </div>
    </div>

    <!-- ===== 削除モーダル ===== -->
    <div
      x-show="showDeleteModal"
      x-cloak
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      class="fixed inset-0 z-50 flex items-center justify-center px-4"
      style="background-color:rgba(0,0,0,0.7);"
      @click.self="closeDelete()"
    >
      <div
        class="w-full max-w-sm rounded-2xl p-6 space-y-4"
        style="background-color:#161e3a; border:1px solid #dc2626;"
      >
        <h3 class="text-base font-bold" style="color:#fbbf24;">
          「<span x-text="deleteTarget && deleteTarget.name"></span>」を削除しますか？
        </h3>
        <p class="text-xs" style="color:#94a3b8;">本人確認のため、自分の名前を選択するか管理者パスワードを入力してください。</p>

        <!-- 本人選択 -->
        <div>
          <label class="block text-xs mb-1" style="color:#94a3b8;">自分の名前（本人確認）</label>
          <select
            x-model="deleteSelfId"
            class="w-full rounded-lg px-3 py-2 text-sm outline-none"
            style="background-color:#0f1629; border:1px solid #1e2a4a; color:#f1f5f9;"
          >
            <option value="">-- 選択してください --</option>
            <template x-for="opt in members" :key="opt.id">
              <option :value="opt.id" x-text="opt.name"></option>
            </template>
          </select>
        </div>

        <!-- 区切り -->
        <div class="flex items-center gap-2">
          <hr class="flex-1" style="border-color:#1e2a4a;"/>
          <span class="text-xs" style="color:#64748b;">または</span>
          <hr class="flex-1" style="border-color:#1e2a4a;"/>
        </div>

        <!-- 管理者パスワード -->
        <div>
          <label class="block text-xs mb-1" style="color:#94a3b8;">管理者パスワード</label>
          <input
            x-model="deleteAdminPw"
            type="password"
            placeholder="管理者パスワード"
            class="w-full rounded-lg px-3 py-2 text-sm outline-none"
            style="background-color:#0f1629; border:1px solid #1e2a4a; color:#f1f5f9; caret-color:#fbbf24;"
          />
        </div>

        <!-- エラー -->
        <p x-show="deleteError" x-cloak class="text-xs" style="color:#f87171;" x-text="deleteError"></p>

        <div class="flex gap-2 pt-1">
          <button
            @click="confirmDelete()"
            :disabled="deleteLoading"
            class="flex-1 py-2 rounded-lg text-sm font-bold"
            style="background-color:#dc2626; color:#fff;"
            :style="deleteLoading ? 'opacity:0.5;' : ''"
          >
            <span x-show="!deleteLoading">削除する</span>
            <span x-show="deleteLoading" x-cloak>削除中...</span>
          </button>
          <button
            @click="closeDelete()"
            class="flex-1 py-2 rounded-lg text-sm font-bold"
            style="background-color:#1e2a4a; color:#94a3b8;"
          >キャンセル</button>
        </div>
      </div>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="mt-10 py-6 px-4 text-center border-t" style="border-color:#1e2a4a;">
    <p class="text-xs" style="color:#64748b;">
      ※ 登録した名前はコミュニティ内でユニークです。
    </p>
  </footer>

  <script>
    function memberApp() {
      return {
        members: [],
        loading: true,

        // 登録フォーム
        newName: '',
        regMsg: '',
        regError: '',
        regLoading: false,

        // 編集
        editingId: null,
        editName: '',
        editSelfId: '',
        editError: '',

        // 削除
        showDeleteModal: false,
        deleteTarget: null,
        deleteSelfId: '',
        deleteAdminPw: '',
        deleteError: '',
        deleteLoading: false,

        async init() {
          // ?id= があれば個人詳細にリダイレクト
          const params = new URLSearchParams(window.location.search);
          const id = params.get('id');
          if (id) {
            window.location.href = '/static/member_detail.html?id=' + id;
            return;
          }
          await this.fetchMembers();
        },

        async fetchMembers() {
          this.loading = true;
          try {
            const res = await fetch(`${API_BASE}/api/members`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            this.members = await res.json();
          } catch (e) {
            console.error('メンバー取得エラー:', e);
          } finally {
            this.loading = false;
          }
        },

        async register() {
          this.regMsg = '';
          this.regError = '';
          const name = this.newName.trim();
          if (!name) {
            this.regError = '名前を入力してください';
            return;
          }
          this.regLoading = true;
          try {
            const res = await fetch(`${API_BASE}/api/members`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name }),
            });
            const data = await res.json();
            if (!res.ok) {
              this.regError = data.detail || '登録に失敗しました';
              return;
            }
            this.regMsg = '登録しました！';
            this.newName = '';
            await this.fetchMembers();
            setTimeout(() => { this.regMsg = ''; }, 3000);
          } catch (e) {
            this.regError = '通信エラーが発生しました';
          } finally {
            this.regLoading = false;
          }
        },

        startEdit(member) {
          this.editingId = member.id;
          this.editName = member.name;
          this.editSelfId = '';
          this.editError = '';
        },

        cancelEdit() {
          this.editingId = null;
          this.editName = '';
          this.editSelfId = '';
          this.editError = '';
        },

        async saveEdit(member) {
          this.editError = '';
          const name = this.editName.trim();
          if (!name) {
            this.editError = '名前を入力してください';
            return;
          }
          if (!this.editSelfId) {
            this.editError = '本人確認のため自分の名前を選択してください';
            return;
          }
          try {
            const res = await fetch(`${API_BASE}/api/members/${member.id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name,
                member_id: parseInt(this.editSelfId),
              }),
            });
            const data = await res.json();
            if (!res.ok) {
              this.editError = data.detail || '編集に失敗しました';
              return;
            }
            this.cancelEdit();
            await this.fetchMembers();
          } catch (e) {
            this.editError = '通信エラーが発生しました';
          }
        },

        openDelete(member) {
          this.deleteTarget = member;
          this.deleteSelfId = '';
          this.deleteAdminPw = '';
          this.deleteError = '';
          this.showDeleteModal = true;
        },

        closeDelete() {
          this.showDeleteModal = false;
          this.deleteTarget = null;
          this.deleteError = '';
        },

        async confirmDelete() {
          this.deleteError = '';
          if (!this.deleteSelfId && !this.deleteAdminPw.trim()) {
            this.deleteError = '自分の名前を選択するか、管理者パスワードを入力してください';
            return;
          }
          this.deleteLoading = true;
          try {
            const body = {};
            if (this.deleteSelfId) body.member_id = parseInt(this.deleteSelfId);
            if (this.deleteAdminPw.trim()) body.admin_password = this.deleteAdminPw.trim();

            const res = await fetch(`${API_BASE}/api/members/${this.deleteTarget.id}`, {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) {
              this.deleteError = data.detail || '削除に失敗しました';
              return;
            }
            this.closeDelete();
            await this.fetchMembers();
          } catch (e) {
            this.deleteError = '通信エラーが発生しました';
          } finally {
            this.deleteLoading = false;
          }
        },
      };
    }
  </script>
</body>
</html>
