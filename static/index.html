<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポケカ大会管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              900: '#0a0e1a',
              800: '#0f1629',
              700: '#161e3a',
              600: '#1e2a4a',
            },
          },
        },
      },
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/static/js/config.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="min-h-screen text-white" style="background-color:#0a0e1a;">

  <!-- ===== HEADER ===== -->
  <header
    x-data="{ open: false }"
    class="sticky top-0 z-50 shadow-lg"
    style="background-color:#0f1629; border-bottom:2px solid #dc2626;"
  >
    <div class="flex items-center justify-between px-4 py-3">
      <!-- タイトル -->
      <a href="/static/index.html" class="text-xl font-black tracking-tight" style="color:#fbbf24;">
        ポケカ大会管理
      </a>

      <!-- ハンバーガーボタン -->
      <button
        @click="open = !open"
        class="p-2 rounded-lg focus:outline-none"
        style="color:#fbbf24;"
        aria-label="メニューを開く"
      >
        <svg x-show="!open" xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg x-show="open" x-cloak xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- ドロップダウンメニュー -->
    <nav
      x-show="open"
      x-cloak
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 -translate-y-2"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 translate-y-0"
      x-transition:leave-end="opacity-0 -translate-y-2"
      @click.outside="open = false"
      class="border-t"
      style="background-color:#161e3a; border-color:#1e2a4a;"
    >
      <ul class="py-1">
        <template x-for="item in [
          { label: 'ランキング',     href: '/static/index.html' },
          { label: 'メンバー登録',   href: '/static/member.html' },
          { label: 'シティリーグ',   href: '/static/city.html' },
          { label: 'トレリ',         href: '/static/trainer.html' },
          { label: 'CL記録',         href: '/static/cl.html' },
          { label: 'カレンダー',     href: '/static/calendar.html' },
          { label: '管理者',         href: '/static/admin.html' },
        ]" :key="item.href">
          <li>
            <a
              :href="item.href"
              @click="open = false"
              class="block px-6 py-3 text-sm font-medium border-l-4 border-transparent transition-all"
              style="color:#e2e8f0;"
              onmouseover="this.style.borderLeftColor='#dc2626'; this.style.backgroundColor='#1e2a4a';"
              onmouseout="this.style.borderLeftColor='transparent'; this.style.backgroundColor='';"
              x-text="item.label"
            ></a>
          </li>
        </template>
      </ul>
    </nav>
  </header>

  <!-- ===== MAIN ===== -->
  <main
    x-data="rankingApp()"
    x-init="fetchRanking()"
    class="max-w-2xl mx-auto px-4 py-6"
  >
    <!-- セクションタイトル -->
    <div class="flex items-center gap-3 mb-5">
      <div class="w-1 h-7 rounded-full" style="background-color:#dc2626;"></div>
      <h2 class="text-lg font-bold tracking-wide" style="color:#fbbf24;">CSP ランキング</h2>
    </div>

    <!-- ローディング -->
    <div x-show="loading" x-cloak class="flex flex-col items-center justify-center py-16 gap-4">
      <svg class="animate-spin w-10 h-10" style="color:#dc2626;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      <span class="text-sm" style="color:#94a3b8;">読み込み中...</span>
    </div>

    <!-- データなし -->
    <div x-show="!loading && ranking.length === 0" x-cloak class="text-center py-16">
      <p class="text-base" style="color:#94a3b8;">まだデータがありません</p>
    </div>

    <!-- ランキングリスト -->
    <div x-show="!loading && ranking.length > 0" x-cloak class="space-y-3">
      <template x-for="(item, index) in ranking" :key="item.id">
        <div
          :class="index === 0 ? 'rounded-xl p-4 shadow-lg' : 'rounded-xl p-3'"
          :style="index === 0
            ? 'background:linear-gradient(135deg,#1e2a4a 0%,#2a1a00 100%); border:2px solid #f59e0b;'
            : 'background-color:#161e3a; border:1px solid #1e2a4a;'"
        >
          <div class="flex items-center gap-3">
            <!-- 順位バッジ -->
            <div
              class="flex-shrink-0 flex items-center justify-center rounded-full font-black"
              :class="index === 0 ? 'w-11 h-11 text-lg' : 'w-9 h-9 text-sm'"
              :style="index === 0
                ? 'background:linear-gradient(135deg,#f59e0b,#fbbf24); color:#0a0e1a;'
                : index === 1
                  ? 'background-color:#4b5563; color:#e5e7eb;'
                  : index === 2
                    ? 'background-color:#78350f; color:#fcd34d;'
                    : 'background-color:#1e2a4a; color:#94a3b8;'"
              x-text="(index + 1) + '位'"
            ></div>

            <!-- 名前 + バッジ -->
            <div class="flex-1 min-w-0">
              <a
                :href="'/static/member.html?id=' + item.id"
                class="block font-semibold truncate"
                :class="index === 0 ? 'text-lg' : 'text-base'"
                :style="index === 0 ? 'color:#fbbf24;' : 'color:#f1f5f9;'"
                x-text="item.name"
              ></a>
              <!-- バッジ行 -->
              <div class="flex flex-wrap gap-1 mt-1">
                <span x-show="item.badges.wcs" x-cloak
                  class="text-xs px-1.5 py-0.5 rounded font-bold"
                  style="background-color:#7c3aed; color:#fff;">👑🌍 WCS</span>
                <span x-show="item.badges.jcs" x-cloak
                  class="text-xs px-1.5 py-0.5 rounded font-bold"
                  style="background-color:#1d4ed8; color:#fff;">👑🇯🇵 JCS</span>
                <span x-show="item.badges.next_cl" x-cloak
                  class="text-xs px-1.5 py-0.5 rounded font-bold"
                  style="background-color:#065f46; color:#fff;">👑🎯 CL優先</span>
                <span x-show="item.badges.city_winner" x-cloak
                  class="text-xs px-1.5 py-0.5 rounded font-bold"
                  style="background-color:#92400e; color:#fcd34d;">🏆 シティ優勝</span>
                <span x-show="item.badges.cl_wcs" x-cloak
                  class="text-xs px-1.5 py-0.5 rounded font-bold"
                  style="background-color:#1e3a5f; color:#93c5fd;">⚡ CL入賞</span>
              </div>
            </div>

            <!-- CSP -->
            <div class="flex-shrink-0 text-right">
              <span
                class="font-black tabular-nums"
                :class="index === 0 ? 'text-2xl' : 'text-xl'"
                :style="index === 0 ? 'color:#fbbf24;' : 'color:#f1f5f9;'"
                x-text="item.total_csp"
              ></span>
              <span
                class="block text-xs"
                :style="index === 0 ? 'color:#fcd34d;' : 'color:#64748b;'"
              >pt</span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="mt-10 py-6 px-4 text-center border-t" style="border-color:#1e2a4a;">
    <p class="text-xs leading-relaxed" style="color:#64748b;">
      ※ ランキングはコミュニティ内の順位です。全国順位とは異なります。
    </p>
  </footer>

  <script>
    function rankingApp() {
      return {
        loading: true,
        ranking: [],

        async fetchRanking() {
          try {
            const res = await fetch(`${API_BASE}/api/ranking`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            this.ranking = await res.json();
          } catch (e) {
            console.error("ランキング取得エラー:", e);
            this.ranking = [];
          } finally {
            this.loading = false;
          }
        },
      };
    }
  </script>
</body>
</html>
