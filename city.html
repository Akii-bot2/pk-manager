<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>シティリーグ | ポケカ大会管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/csp.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    input, select { background-color:#0f1629; border:1px solid #1e2a4a; color:#f1f5f9; border-radius:0.5rem; padding:0.5rem 0.75rem; width:100%; outline:none; }
    input:focus, select:focus { border-color:#dc2626; box-shadow:0 0 0 2px rgba(220,38,38,0.2); }
    input[type="checkbox"] { width:auto; accent-color:#dc2626; }
  </style>
</head>
<body class="min-h-screen text-white" style="background-color:#0a0e1a;">

  <!-- ===== HEADER ===== -->
  <header x-data="{ open: false }" class="sticky top-0 z-50 shadow-lg"
    style="background-color:#0f1629; border-bottom:2px solid #dc2626;">
    <div class="flex items-center justify-between px-4 py-3">
      <a href="./index.html" class="text-xl font-black tracking-tight" style="color:#fbbf24;">ポケカ大会管理</a>
      <button @click="open = !open" class="p-2 rounded-lg" style="color:#fbbf24;" aria-label="メニュー">
        <svg x-show="!open" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        <svg x-show="open" x-cloak class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <nav x-show="open" x-cloak x-transition @click.outside="open = false" class="border-t"
      style="background-color:#161e3a; border-color:#1e2a4a;">
      <ul class="py-1">
        <template x-for="item in [
          { label: 'ランキング', href: './index.html' },
          { label: 'メンバー登録', href: './member.html' },
          { label: 'シティリーグ', href: './city.html' },
          { label: 'トレリ', href: './trainer.html' },
          { label: 'CL記録', href: './cl.html' },
          { label: 'カレンダー', href: './calendar.html' },
          { label: '管理者', href: './admin.html' },
        ]" :key="item.href">
          <li><a :href="item.href" @click="open = false"
            class="block px-6 py-3 text-sm font-medium border-l-4 border-transparent transition-all"
            style="color:#e2e8f0;"
            onmouseover="this.style.borderLeftColor='#dc2626';this.style.backgroundColor='#1e2a4a';"
            onmouseout="this.style.borderLeftColor='transparent';this.style.backgroundColor='';"
            x-text="item.label"></a></li>
        </template>
      </ul>
    </nav>
  </header>

  <!-- ===== MAIN ===== -->
  <main x-data="cityApp()" x-init="init()" class="max-w-2xl mx-auto px-4 py-6 space-y-8">

    <!-- メンバー選択 -->
    <section>
      <div class="flex items-center gap-3 mb-4">
        <div class="w-1 h-7 rounded-full" style="background-color:#dc2626;"></div>
        <h2 class="text-lg font-bold tracking-wide" style="color:#fbbf24;">メンバー選択</h2>
      </div>
      <div class="rounded-xl p-4" style="background-color:#161e3a; border:1px solid #1e2a4a;">
        <label class="block text-sm mb-1" style="color:#94a3b8;">自分のメンバーを選択</label>
        <select x-model="selectedMemberId" @change="onMemberChange()">
          <option value="">-- メンバーを選択 --</option>
          <template x-for="m in members" :key="m.id">
            <option :value="m.id" x-text="m.name"></option>
          </template>
        </select>
      </div>
    </section>

    <!-- 参加予定登録フォーム -->
    <section>
      <div class="flex items-center gap-3 mb-4">
        <div class="w-1 h-7 rounded-full" style="background-color:#dc2626;"></div>
        <h2 class="text-lg font-bold tracking-wide" style="color:#fbbf24;">参加予定を登録</h2>
      </div>
      <div class="rounded-xl p-4 space-y-4" style="background-color:#161e3a; border:1px solid #1e2a4a;">

        <div>
          <label class="block text-sm mb-1" style="color:#94a3b8;">シーズン</label>
          <select x-model="form.season_id">
            <option value="">-- シーズンを選択 --</option>
            <template x-for="s in seasons" :key="s.id">
              <option :value="s.id" x-text="s.name"></option>
            </template>
          </select>
        </div>

        <div class="flex items-center gap-3">
          <input type="checkbox" id="is_absent" x-model="form.is_absent" class="w-5 h-5 rounded cursor-pointer" />
          <label for="is_absent" class="text-sm cursor-pointer" style="color:#e2e8f0;">不参加</label>
        </div>

        <div x-show="!form.is_absent" class="space-y-4">
          <div>
            <label class="block text-sm mb-1" style="color:#94a3b8;">日付</label>
            <input type="date" x-model="form.date" />
          </div>
          <div>
            <label class="block text-sm mb-1" style="color:#94a3b8;">会場</label>
            <input type="text" x-model="form.venue" placeholder="例：〇〇カードショップ" />
          </div>
        </div>

        <button @click="register()"
          class="w-full py-2.5 rounded-lg font-bold text-sm transition-opacity hover:opacity-80"
          style="background-color:#dc2626; color:#fff;">登録する</button>

        <div x-show="message" x-cloak x-text="message" class="text-sm px-3 py-2 rounded-lg"
          :style="messageType === 'success'
            ? 'background-color:#052e16; color:#4ade80; border:1px solid #166534;'
            : 'background-color:#2d0a0a; color:#f87171; border:1px solid #7f1d1d;'"></div>
      </div>
    </section>

    <!-- 登録済みエントリー一覧 -->
    <section x-show="selectedMemberId" x-cloak>
      <div class="flex items-center gap-3 mb-4">
        <div class="w-1 h-7 rounded-full" style="background-color:#dc2626;"></div>
        <h2 class="text-lg font-bold tracking-wide" style="color:#fbbf24;">登録済みシティ情報</h2>
      </div>

      <div x-show="loadingEntries" class="flex justify-center py-10">
        <svg class="animate-spin w-6 h-6" style="color:#dc2626;" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
      </div>

      <div x-show="!loadingEntries && entries.length === 0" x-cloak
        class="rounded-xl p-6 text-center" style="background-color:#161e3a; border:1px solid #1e2a4a;">
        <p class="text-sm" style="color:#64748b;">登録済みのエントリーはありません</p>
      </div>

      <div x-show="!loadingEntries && entries.length > 0" x-cloak class="space-y-3">
        <template x-for="entry in entries" :key="entry.id + '_' + entry.updated_at">
          <div class="rounded-xl overflow-hidden" style="background-color:#161e3a; border:1px solid #1e2a4a;">

            <!-- メイン行 -->
            <div class="p-4">
              <div class="flex items-start justify-between gap-2">
                <div class="flex-1 min-w-0 space-y-1">
                  <p class="font-bold text-sm" style="color:#fbbf24;" x-text="seasonName(entry.season_id)"></p>
                  <p class="text-sm" style="color:#cbd5e1;">
                    <span x-show="entry.is_absent" class="px-2 py-0.5 rounded text-xs font-bold" style="background-color:#374151; color:#9ca3af;">不参加</span>
                    <span x-show="!entry.is_absent && entry.date" x-text="entry.date" style="color:#94a3b8;"></span>
                    <span x-show="!entry.is_absent && entry.venue" x-text="' ' + entry.venue" style="color:#e2e8f0;"></span>
                    <span x-show="!entry.is_absent && !entry.date && !entry.venue" style="color:#64748b;">日程未定</span>
                  </p>
                  <div class="flex items-center gap-3 text-xs" style="color:#64748b;">
                    <span>CSP: <span :style="entry.csp_earned ? 'color:#fbbf24; font-weight:bold;' : 'color:#64748b;'"
                      x-text="entry.csp_earned != null ? entry.csp_earned + ' pt' : '—'"></span></span>
                    <span>ステータス: <span :style="statusStyle(entry)" x-text="statusLabel(entry)"></span></span>
                  </div>
                </div>

                <div class="flex flex-col gap-2 flex-shrink-0">
                  <button @click="editingId === entry.id ? cancelEdit() : startEdit(entry)"
                    class="px-3 py-1 rounded text-xs font-bold transition-opacity hover:opacity-80"
                    :style="editingId === entry.id
                      ? 'background-color:#374151; color:#9ca3af;'
                      : 'background-color:#1e3a5f; color:#93c5fd;'"
                    x-text="editingId === entry.id ? 'キャンセル' : '編集'"></button>
                  <a x-show="!entry.is_absent"
                    :href="'./city_result.html?id=' + entry.id"
                    class="px-3 py-1 rounded text-xs font-bold text-center transition-opacity hover:opacity-80"
                    style="background-color:#1a2e1a; color:#4ade80;">結果入力</a>
                  <button @click="deleteEntry(entry)"
                    class="px-3 py-1 rounded text-xs font-bold transition-opacity hover:opacity-80"
                    style="background-color:#2d0a0a; color:#f87171;">削除</button>
                </div>
              </div>
            </div>

            <!-- 編集フォーム -->
            <div x-show="editingId === entry.id" x-cloak
              class="px-4 pb-4 pt-2 border-t space-y-3" style="border-color:#1e2a4a;">
              <p class="text-xs font-bold" style="color:#94a3b8;">編集</p>
              <div class="flex items-center gap-3">
                <input type="checkbox" :id="'edit_absent_' + entry.id" x-model="editForm.is_absent" class="w-5 h-5 rounded cursor-pointer" />
                <label :for="'edit_absent_' + entry.id" class="text-sm cursor-pointer" style="color:#e2e8f0;">不参加</label>
              </div>
              <div x-show="!editForm.is_absent" class="space-y-3">
                <div><label class="block text-xs mb-1" style="color:#94a3b8;">日付</label><input type="date" x-model="editForm.date" /></div>
                <div><label class="block text-xs mb-1" style="color:#94a3b8;">会場</label><input type="text" x-model="editForm.venue" placeholder="例：〇〇カードショップ" /></div>
              </div>
              <p x-show="editMsg" x-cloak class="text-xs" style="color:#f87171;" x-text="editMsg"></p>
              <button @click="saveEdit(entry)"
                class="w-full py-2 rounded-lg text-xs font-bold hover:opacity-80"
                style="background-color:#1e3a5f; color:#93c5fd;">変更を保存</button>
            </div>

          </div>
        </template>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="mt-10 py-6 px-4 text-center border-t" style="border-color:#1e2a4a;">
    <p class="text-xs" style="color:#64748b;">※ ランキングはコミュニティ内の順位です。全国順位とは異なります。</p>
  </footer>

  <script>
    function cityApp() {
      return {
        members: [],
        seasons: [],
        selectedMemberId: '',
        entries: [],
        loadingEntries: false,
        form: { season_id: '', is_absent: false, date: '', venue: '' },
        message: '',
        messageType: '',
        editingId: null,
        editForm: { is_absent: false, date: '', venue: '' },
        editMsg: '',

        async init() {
          const [members, seasons] = await Promise.all([
            gasGet('getMembers').catch(() => []),
            gasGet('getSeasons').catch(() => []),
          ]);
          this.members = members;
          this.seasons = seasons;
        },

        async onMemberChange() {
          this.entries = [];
          this.editingId = null;
          if (!this.selectedMemberId) return;
          await this.fetchEntries();
        },

        async fetchEntries() {
          this.loadingEntries = true;
          try {
            const all = await gasGet('getCity');
            this.entries = all
              .filter(e => String(e.member_id) === String(this.selectedMemberId))
              .sort((a, b) => Number(a.season_id) - Number(b.season_id));
          } catch (e) {
            console.error('エントリー取得エラー:', e);
          } finally {
            this.loadingEntries = false;
          }
        },

        async register() {
          this.message = '';
          if (!this.selectedMemberId) {
            this.message = 'メンバーを選択してください';
            this.messageType = 'error';
            return;
          }
          if (!this.form.season_id) {
            this.message = 'シーズンを選択してください';
            this.messageType = 'error';
            return;
          }
          try {
            await gasPost({
              action: 'addCity',
              member_id: parseInt(this.selectedMemberId),
              season_id: parseInt(this.form.season_id),
              is_absent: this.form.is_absent ? 1 : 0,
              date: this.form.is_absent ? '' : (this.form.date || ''),
              venue: this.form.is_absent ? '' : (this.form.venue || ''),
            });
            this.message = '登録しました';
            this.messageType = 'success';
            this.form = { season_id: '', is_absent: false, date: '', venue: '' };
            await this.fetchEntries();
          } catch (e) {
            this.message = e.message || '登録に失敗しました';
            this.messageType = 'error';
          }
        },

        startEdit(entry) {
          this.editingId = entry.id;
          this.editForm = { is_absent: !!entry.is_absent, date: entry.date || '', venue: entry.venue || '' };
          this.editMsg = '';
        },

        cancelEdit() { this.editingId = null; },

        async saveEdit(entry) {
          this.editMsg = '';
          try {
            await gasPost({
              action: 'updateCity',
              id: entry.id,
              member_id: entry.member_id,
              is_absent: this.editForm.is_absent ? 1 : 0,
              date: this.editForm.is_absent ? '' : (this.editForm.date || ''),
              venue: this.editForm.is_absent ? '' : (this.editForm.venue || ''),
              rank: entry.rank || '',
              participants_count: entry.participants_count || '',
              deck_code: entry.deck_code || '',
            });
            this.editingId = null;
            await this.fetchEntries();
          } catch (e) {
            this.editMsg = e.message || '更新に失敗しました';
          }
        },

        async deleteEntry(entry) {
          if (!confirm('このエントリーを削除しますか？')) return;
          try {
            await gasPost({
              action: 'deleteCity',
              id: entry.id,
              member_id: parseInt(this.selectedMemberId),
            });
            await this.fetchEntries();
          } catch (e) {
            alert('削除に失敗しました: ' + e.message);
          }
        },

        seasonName(season_id) {
          const s = this.seasons.find(s => String(s.id) === String(season_id));
          return s ? s.name : 'シーズン ' + season_id;
        },

        statusLabel(entry) {
          if (entry.is_absent) return '不参加';
          if (entry.rank) return entry.rank + '位 結果入力済み';
          if (entry.date) return '参加予定';
          return '未入力';
        },

        statusStyle(entry) {
          if (entry.is_absent) return 'color:#6b7280;';
          if (entry.rank) return 'color:#4ade80; font-weight:bold;';
          if (entry.date) return 'color:#93c5fd;';
          return 'color:#64748b;';
        },
      };
    }
  </script>
</body>
</html>
